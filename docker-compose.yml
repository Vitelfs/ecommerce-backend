name: e_commerce

services:
  postgres:
    image: postgres:17
    container_name: e_commerce_pg
    restart: always
    command: [ "postgres", "-c", "max_connections=1000" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_EXPOSE}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    networks:
      - e_commerce_network
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: e_commerce_pg_admin
    restart: always
    networks:
      - e_commerce_network
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - ./.data/pgadmin:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
  redis:
    image: redis:latest
    container_name: e_commerce_redis
    restart: always
    networks:
      - e_commerce_network
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./.data/redis:/data
  
  backend:
    container_name: e_commerce_backend
    build: .
    restart: always
    depends_on:
      - postgres
      - redis
    networks:
      - e_commerce_network
    ports:
      - "${PORT}:3000"
    env_file:
      - .env

networks:
  e_commerce_network:
    driver: bridge
